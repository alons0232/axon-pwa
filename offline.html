<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AXON — Sin conexión</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07090F;color:#F0F4FF;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.wrap{max-width:320px;}
.icon{font-size:48px;margin-bottom:16px;opacity:0.6;}
h1{font-size:20px;font-weight:900;letter-spacing:-1px;margin-bottom:8px;}
p{font-size:14px;color:#6B7280;line-height:1.7;margin-bottom:24px;}
button{background:#00FFB2;color:#07090F;border:none;border-radius:10px;padding:12px 26px;font-size:13px;font-weight:700;cursor:pointer;font-family:monospace;letter-spacing:1.5px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>AXON necesita internet para funcionar. Revisa tu conexión e intenta de nuevo.</p>
  <button onclick="location.reload()">→ REINTENTAR</button>
</div>
</body>
</html>
